<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload LinkedIn Profile | ProfilePilot AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/upload.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">
                ProfilePilot AI
            </a>
        </div>
    </nav>

    <section class="upload-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-7">

                    <div class="upload-card">

                        <div class="text-center">

                            <div class="upload-icon">
                                <i class="bi bi-cloud-arrow-up"></i>
                            </div>

                            <h2 class="fw-bold mt-3">
                                Upload Your LinkedIn Profile
                            </h2>

                            <p class="text-muted">
                                Upload your LinkedIn Profile PDF and let AI analyze your profile.
                            </p>

                        </div>

                        <form id="uploadForm">

                            <div class="drop-area">

                                <input type="file" id="fileInput" name="file" accept=".pdf" hidden>

                                <label for="fileInput">

                                    <i class="bi bi-file-earmark-pdf display-4 text-danger"></i>

                                    <h5 class="mt-3">
                                        Drag & Drop PDF Here
                                    </h5>

                                    <p class="text-muted">
                                        or click to browse
                                    </p>

                                </label>

                            </div>

                            <div class="file-box mt-4 d-none" id="fileBox">

                                <i class="bi bi-file-earmark-pdf-fill text-danger fs-3"></i>

                                <span id="fileName"></span>

                                <button type="button" class="btn btn-outline-danger btn-sm" id="removeBtn">

                                    Remove

                                </button>

                            </div>

                            <div class="progress mt-4 d-none" id="progressBox">

                                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%">

                                    Uploading...

                                </div>

                            </div>

                            <div class="d-grid mt-4">

                                <button class="btn btn-primary btn-lg" type="submit">

                                    Analyze Profile

                                </button>

                            </div>

                            <div class="text-center mt-4">

                                <small class="text-muted">

                                    <i class="bi bi-shield-check text-success"></i>

                                    Your PDF is securely processed and not permanently stored.

                                </small>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>
    <script>

        const form = document.getElementById("uploadForm");
        const input = document.getElementById("fileInput");
        const fileName = document.getElementById("fileName");
        const fileBox = document.getElementById("fileBox");
        const removeBtn = document.getElementById("removeBtn");
        const progress = document.getElementById("progressBox");

        input.addEventListener("change", () => {

            if (input.files.length > 0) {
                fileName.innerHTML = input.files[0].name;
                fileBox.classList.remove("d-none");
            }

        });

        removeBtn.addEventListener("click", () => {

            input.value = "";
            fileBox.classList.add("d-none");

        });

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            if (input.files.length === 0) {
                alert("Please select a LinkedIn PDF");
                return;
            }

            progress.classList.remove("d-none");

            const formData = new FormData();
            formData.append("file", input.files[0]);

            try {

                console.log("Uploading...");

                const response = await fetch("http://127.0.0.1:8000/analyze", {
                    method: "POST",
                    body: formData
                });

                console.log("Status:", response.status);

                if (!response.ok) {
                    throw new Error(`Server Error: ${response.status}`);
                }

                const data = await response.json();

                console.log("Backend Response:", data);

                localStorage.setItem("analysisReport", data.report);

                window.location.href = "result.html";

            } catch (error) {

                progress.classList.add("d-none");

                console.error("Full Error:", error);

                alert(error.message);

            }

        });

    </script>

</body>

</html>
