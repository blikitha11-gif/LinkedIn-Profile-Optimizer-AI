<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analysis Report | ProfilePilot AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/result.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">ProfilePilot AI</a>
            <a href="upload.html" class="btn btn-outline-primary">Analyze Another Profile</a>
        </div>
    </nav>

    <div class="container py-5">

        <h1 class="text-center mb-4">
            AI LinkedIn Analysis Report
        </h1>

        <div class="card shadow p-4">

            <pre id="report" style="white-space:pre-wrap;
    font-family:inherit;
    font-size:16px;"></pre>

        </div>

        <div class="text-center mt-4">

            <a href="upload.html" class="btn btn-primary">
                Analyze Another Profile
            </a>

        </div>

    </div>

    <script>

        const report = localStorage.getItem("analysisReport");

        if (report) {

            document.getElementById("report").textContent = report;

        } else {

            document.getElementById("report").textContent =
                "No report found.";

        }

    </script>
</body>

</html>
